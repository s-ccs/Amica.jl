name: Metal Integration

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "ext/**"
      - "test/**"
      - "*.toml"
      - ".github/workflows/MetalIntegration.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "ext/**"
      - "test/**"
      - "*.toml"
      - ".github/workflows/MetalIntegration.yml"
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  metal-integration:
    name: Metal Full Run
    runs-on: macos-15
    timeout-minutes: 120
    env:
      OMP_NUM_THREADS: "1"
      JULIA_NUM_THREADS: "1"
      HOMEBREW_NO_AUTO_UPDATE: "1"
    defaults:
      run:
        working-directory: test
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.12"

      - name: Install Fortran/MPI/BLAS toolchain
        run: brew install gcc open-mpi openblas

      - name: Expose gfortran for Open MPI
        run: |
          gcc_bin="$(brew --prefix gcc)/bin"
          gfortran_bin="$(find "$gcc_bin" -maxdepth 1 -type f -name 'gfortran-*' | sort | tail -n 1)"
          test -n "$gfortran_bin"
          mkdir -p "$RUNNER_TEMP/compiler-bin"
          ln -sf "$gfortran_bin" "$RUNNER_TEMP/compiler-bin/gfortran"
          echo "$RUNNER_TEMP/compiler-bin" >> "$GITHUB_PATH"

      - name: Use Julia cache
        uses: julia-actions/cache@v3

      - name: Instantiate test environment
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run Metal integration script
        run: julia --project=. metal-integration.jl
